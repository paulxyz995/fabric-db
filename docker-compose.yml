# Fabric DB — full stack (PostgreSQL + backend API + frontend/Nginx)
# Jalankan:  docker compose up -d --build
# Buka:      http://localhost:8080  (atau IP server:8080)

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-fabricdb}
    volumes:
      - db_data:/var/lib/postgresql/data
      # Dijalankan otomatis HANYA saat database pertama kali dibuat (volume kosong)
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/src/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-fabricdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-fabricdb}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET wajib diisi di .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      PORT: 4000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - backend

volumes:
  db_data:
